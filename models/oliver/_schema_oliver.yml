version: 2

models:
  - name: oliver_dim_employee
    description: "Oliver employee Dimension"
  - name: oliver_dim_customer
    description: "Oliver Customer Dimension"
  - name: oliver_dim_date
    description: "Oliver Date Dimension"
  - name: oliver_dim_product
    description: "Oliver Product Dimension"
    columns:
      - name: product_key
        tests:
          - unique
      - name: product_name
        tests:
          - accepted_values:
              arguments:
                values:
                  - "Marshmallows"
                  - "Small Popcorn"
                  - "Chocolate Bar"
                  - "Gummy Bears"
                  - "Small Coffee"
  - name: fact_sales
    description: "Oliver Claim Fact"
    columns:
      - name: customer_key
        description: "A foreign key to the customer dimension"
        tests:
          - not_null
  - name: oliver_dim_store
    description: "Oliver store Fact"
  - name: fact_certification
    description: "Oliver Fact Certifications - for each employee"
    columns:
      - name: employee_key
        tests:
          - relationships:
              arguments:
                to: ref('oliver_dim_employee')
                field: employee_key
  - name: stg_employee_certifications
    description: "stg employee certifications - staging table"
